name: Build ADR Gods Pro APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Reconstruct Android project
        run: python3 reconstruct_project.py

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Show APK files
        run: |
          find . -iname "*.apk" | sort

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ADR-Gods-Pro-APK
          path: '**/*.apk'
